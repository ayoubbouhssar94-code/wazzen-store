version: "3.9"

services:
  wazzen_database:
    image: postgres:16-alpine
    container_name: wazzen_database
    environment:
      POSTGRES_USER: wazzen
      POSTGRES_PASSWORD: wazzen
      POSTGRES_DB: wazzen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wazzen -d wazzen"]
      interval: 5s
      timeout: 5s
      retries: 10

  wazzen-backend:
    build: .
    container_name: wazzen-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://wazzen:wazzen@wazzen_database:5432/wazzen
      RUN_MIGRATIONS_ON_START: "true"
    depends_on:
      wazzen_database:
        condition: service_healthy

volumes:
  pgdata:
